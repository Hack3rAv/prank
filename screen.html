<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run.</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: black;
            overflow: hidden; /* No scrollbars */
            font-family: 'Nosifer', cursive;
        }

        /* 1. Full Screen Image Styling */
        .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image covers screen without stretching */
            z-index: -1; /* Puts image behind the text */
            
            /* The fading/breathing animation */
            animation: darkness-pulse 4s infinite alternate;
        }

        /* 2. Container for the text to center it */
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Perfect centering */
            text-align: center;
            width: 100%;
        }

        /* 3. The Blood Text */
        .blood-text {
            color: #cc0000;
            font-size: 3rem; /* Large text */
            text-shadow: 0px 0px 20px #000; /* Shadow to make it readable over image */
            margin-bottom: 50px;
            
            animation: blood-drip 3s infinite;
        }

        /* 4. The Panic "ESCAPE" Text */
        .escape-text {
            font-family: 'Courier New', monospace;
            font-weight: 900;
            font-size: 5rem;
            color: #ff0000;
            letter-spacing: 10px;
            text-shadow: 2px 2px 0px #fff;
            
            animation: glitch-flash 0.15s infinite;
        }

        /* --- ANIMATIONS --- */

        /* Makes the background image fade in and out */
        @keyframes darkness-pulse {
            0% { opacity: 0.1; filter: grayscale(100%) blur(2px); }
            50% { opacity: 0.6; filter: sepia(100%) hue-rotate(-50deg); }
            100% { opacity: 1; filter: contrast(120%); }
        }

        /* Makes the blood text throb */
        @keyframes blood-drip {
            0% { opacity: 0.6; text-shadow: 0 0 5px black; }
            50% { opacity: 1; text-shadow: 0 0 30px red; transform: scale(1.05); }
            100% { opacity: 0.6; text-shadow: 0 0 5px black; }
        }

        /* Rapid glitch effect */
        @keyframes glitch-flash {
            0% { opacity: 1; transform: skewX(0deg); }
            20% { opacity: 0.1; transform: skewX(-20deg); }
            40% { opacity: 1; transform: skewX(20deg); }
            60% { opacity: 0.1; transform: skewX(0deg); }
            80% { opacity: 1; transform: skewX(-10deg); }
            100% { opacity: 1; transform: skewX(0deg); }
        }

        /* Mobile adjustment */
        @media (max-width: 768px) {
            .blood-text { font-size: 1.5rem; }
            .escape-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <img src="x4.jpg" alt="scary background" class="fullscreen-bg">

    <div class="content-overlay">
        <div class="blood-text">
            I will find you..<br>
            You have saw me ..
        </div>

        <div class="escape-text">
            ESCAPE ESCAPE ESCAPE
        </div>
    </div>

</body>
</html>
