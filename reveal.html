<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Safe</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h1 {
            color: #00ff88;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ccc;
        }

        .highlight {
            color: #ff4757;
            font-weight: bold;
        }

        .l-highlight {
            color: #06f3cc;
            font-weight: bold;
        }

        /* Stylish Neopix Link */
        .neopix-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            color: white;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .neopix-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 117, 252, 0.6);
        }

        .neopix-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .neopix-btn:hover::after {
            left: 100%;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Relaxxx! ❤️</h1>
        <p>
            Don't worry, you are completely safe.<br>
            This was just a prank conducted by <span class="highlight">Legend Aura.</span><br>
            Created with 😈 by <span class="l-highlight">Legend Aura</span>.
        </p>
        
        <a href="https://neopix.in" class="neopix-btn">Powered by Neopix</a>
    </div>
</body>
</html>
